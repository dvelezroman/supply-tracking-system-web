<app-page-header [title]="'users.listTitle' | transloco" [subtitle]="'users.listSubtitle' | transloco" />

@if (isLoading()) {
  <mat-progress-bar mode="indeterminate" />
}

<div class="table-container mat-elevation-z1">
  <table mat-table [dataSource]="users()">
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let u">
        <div class="user-cell">
          <mat-icon>account_circle</mat-icon>
          {{ u.name }}
        </div>
      </td>
    </ng-container>

    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let u">{{ u.email }}</td>
    </ng-container>

    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Role</th>
      <td mat-cell *matCellDef="let u">
        <mat-chip [color]="u.role === 'ADMIN' ? 'primary' : 'accent'" [highlighted]="u.role === 'ADMIN'">
          {{ u.role }}
        </mat-chip>
      </td>
    </ng-container>

    <ng-container matColumnDef="createdAt">
      <th mat-header-cell *matHeaderCellDef>Joined</th>
      <td mat-cell *matCellDef="let u">{{ u.createdAt | date:'mediumDate' }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="columns"></tr>
    <tr mat-row *matRowDef="let row; columns: columns;"></tr>
  </table>

  @if (!isLoading() && users().length === 0) {
    <div class="empty-state">
      <mat-icon>group</mat-icon>
      <p>No users found</p>
    </div>
  }

  <mat-paginator
    [length]="totalItems()"
    [pageSize]="pageSize()"
    [pageSizeOptions]="[10, 20, 50]"
    (page)="onPageChange($event)"
    showFirstLastButtons
  />
</div>
