<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Marea Alta — Camarones con origen y trazabilidad</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a2647" />
    <meta
      name="description"
      content="Marea Alta: camarones premium del Ecuador con más de 40 años de legado familiar, trazabilidad completa desde la larva hasta tu mesa y origen verificable en El Oro."
    />
    <link rel="icon" type="image/png" sizes="48x31" href="assets/marea-alta-favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Open+Sans:wght@400;600&family=Playfair+Display:ital,wght@0,500;1,500&family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script>
      (function () {
        try {
          var m = document.cookie.match(/(?:^|;\s*)st_theme=([^;]*)/);
          var v = m && decodeURIComponent(m[1].replace(/\+/g, ' '));
          if (v === 'dark') {
            document.documentElement.classList.add('theme-dark');
          }
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var legacyHost = 'supply-tracking-system.porto-rockcity-app.com';
          var p = location.pathname;
          var isPublicTraceQr =
            location.hostname.toLowerCase() === legacyHost &&
            (p === '/trace' || p.startsWith('/trace/'));
          if (isPublicTraceQr) {
            location.replace(
              'https://www.marea-alta.ec' + p + location.search + location.hash
            );
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="mat-typography">
    <app-root></app-root>
  </body>
</html>
